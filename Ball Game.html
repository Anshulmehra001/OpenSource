<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addictive Breakout Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a202c; /* Dark background */
            color: #ececec; /* Light text */
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
        }
        canvas {
            background-color: #000;
            border: 5px solid #a0aec0; /* Gray border */
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 60px rgba(0, 255, 255, 0.3); /* Neon glow */
            display: block;
            margin-bottom: 20px;
            touch-action: none; /* Disable default touch actions like scrolling/zooming */
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px; /* Match canvas max-width */
            padding: 0 20px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 1.2em;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            background: linear-gradient(145deg, #6b46c1, #805ad5); /* Purple gradient */
            color: white;
            font-family: 'Press Start 2P', cursive;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            background: linear-gradient(145deg, #805ad5, #6b46c1); /* Reverse gradient on hover */
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transition: all 0.7s ease;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            z-index: 1;
        }
        button:hover::before {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.85);
            border: 3px solid #0ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            font-size: 1.5em;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.7);
            z-index: 100;
            display: none; /* Hidden by default */
        }
        .message-box h2 {
            color: #0ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff;
        }
        .message-box button {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="game-info">
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button id="startButton">Start Game</button>
        <button id="restartButton" style="display: none;">Restart Game</button>
    </div>

    <div id="messageBox" class="message-box">
        <h2 id="messageTitle"></h2>
        <p id="messageText"></p>
        <button id="messageButton">OK</button>
    </div>

    <script>
        // Get canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set up game elements and variables
        let gameStarted = false;
        let gameOver = false;
        let gameWon = false;
        let score = 0;
        let lives = 3;
        let animationFrameId; // To store the requestAnimationFrame ID

        // Ball properties
        const ballRadius = 10;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 2; // Ball's x-direction speed
        let dy = -2; // Ball's y-direction speed

        // Paddle properties
        const paddleHeight = 10;
        const paddleWidth = 100;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // Brick properties
        const brickRowCount = 5;
        const brickColumnCount = 8; // Increased column count for more bricks
        const brickWidth = 75;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 30;
        let bricks = []; // Array to hold brick objects

        // Message Box elements
        const messageBox = document.getElementById('messageBox');
        const messageTitle = document.getElementById('messageTitle');
        const messageText = document.getElementById('messageText');
        const messageButton = document.getElementById('messageButton');

        // UI elements
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');

        // --- Event Listeners ---
        document.addEventListener('keydown', keyDownHandler, false);
        document.addEventListener('keyup', keyUpHandler, false);
        canvas.addEventListener('mousemove', mouseMoveHandler, false);
        canvas.addEventListener('touchmove', touchMoveHandler, false);
        canvas.addEventListener('touchstart', touchStartHandler, false);
        canvas.addEventListener('touchend', touchEndHandler, false);
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', restartGame);
        messageButton.addEventListener('click', hideMessageBox);

        // --- Game Setup Functions ---

        /**
         * Initializes the bricks array with their positions and status.
         * Each brick is an object with x, y coordinates and a 'status' (1 for visible, 0 for broken).
         */
        function initializeBricks() {
            bricks = []; // Clear existing bricks
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 }; // Status 1 means brick is active/visible
                }
            }
        }

        /**
         * Resets all game variables to their initial state.
         */
        function resetGame() {
            score = 0;
            lives = 3;
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 2;
            dy = -2;
            paddleX = (canvas.width - paddleWidth) / 2;
            initializeBricks(); // Re-initialize all bricks
            gameOver = false;
            gameWon = false;
            updateUI();
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId); // Stop any ongoing animation
            }
        }

        /**
         * Dynamically sets the canvas size based on window dimensions.
         * Ensures responsiveness.
         */
        function setCanvasSize() {
            const aspectRatio = 16 / 9; // Desired aspect ratio (e.g., 16:9)
            let newWidth, newHeight;

            const maxWidth = window.innerWidth * 0.9;
            const maxHeight = window.innerHeight * 0.7;

            if (maxWidth / aspectRatio < maxHeight) {
                newWidth = maxWidth;
                newHeight = newWidth / aspectRatio;
            } else {
                newHeight = maxHeight;
                newWidth = newHeight * aspectRatio;
            }

            canvas.width = newWidth > 800 ? 800 : newWidth; // Max width 800px
            canvas.height = newHeight > 600 ? 600 : newHeight; // Max height 600px

            // Recalculate ball and paddle positions based on new canvas size
            x = canvas.width / 2;
            y = canvas.height - 30;
            paddleX = (canvas.width - paddleWidth) / 2;

            // Redraw everything after resize
            draw();
        }

        // Call setCanvasSize initially and on window resize
        window.addEventListener('resize', setCanvasSize);
        window.onload = function() {
            initializeBricks(); // Initialize bricks BEFORE setting canvas size and drawing
            setCanvasSize(); // Set size on load, which calls draw()
            // draw() is already called by setCanvasSize, no need for redundant call here.
        };

        // --- UI Update Functions ---

        /**
         * Updates the score and lives display on the UI.
         */
        function updateUI() {
            scoreDisplay.textContent = `Score: ${score}`;
            livesDisplay.textContent = `Lives: ${lives}`;
        }

        /**
         * Displays a message box with a title and text.
         * @param {string} title - The title of the message.
         * @param {string} text - The main content of the message.
         * @param {function} [callback] - Optional callback function to execute when the message box is closed.
         */
        function showMessageBox(title, text, callback) {
            messageTitle.textContent = title;
            messageText.textContent = text;
            messageBox.style.display = 'block';
            messageButton.onclick = () => {
                hideMessageBox();
                if (callback) callback();
            };
        }

        /**
         * Hides the message box.
         */
        function hideMessageBox() {
            messageBox.style.display = 'none';
        }

        // --- Drawing Functions ---

        /**
         * Draws the ball on the canvas.
         */
        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffff'; /* Cyan */
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; /* Reset shadow for other elements */
        }

        /**
         * Draws the paddle on the canvas.
         */
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = '#ff00ff'; /* Magenta */
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        /**
         * Draws all active bricks on the canvas.
         */
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) { // Only draw if brick is active
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);

                        // Dynamic brick colors for a cool effect
                        const hue = (c * r * 10) % 360; // Vary hue based on position
                        ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                        ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                        ctx.shadowBlur = 10;
                        ctx.fill();
                        ctx.closePath();
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        /**
         * Main drawing function. Clears canvas and draws all game elements.
         */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear the entire canvas
            drawBricks();
            drawBall();
            drawPaddle();
            updateUI();
        }

        // --- Game Logic Functions ---

        /**
         * Handles collisions between the ball and bricks.
         */
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    // Check if brick is active (status === 1)
                    if (b.status === 1) {
                        // Collision detection logic
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy; // Reverse ball direction
                            b.status = 0; // Mark brick as broken
                            score++; // Increase score

                            // Check for win condition
                            if (score === brickRowCount * brickColumnCount) {
                                gameWon = true;
                                gameOver = true; // Set game over to stop animation
                                showMessageBox('YOU WON!', 'Congratulations! You broke all the bricks!', () => {
                                    restartButton.style.display = 'block';
                                    startButton.style.display = 'none';
                                });
                            }
                        }
                    }
                }
            }
        }

        /**
         * Main game update loop.
         * Handles ball movement, paddle movement, collisions, and game state.
         */
        function update() {
            if (gameOver || gameWon || !gameStarted) {
                return; // Stop updating if game is over, won, or not started
            }

            // Move ball
            x += dx;
            y += dy;

            // Ball collision with walls
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx; // Reverse x-direction
            }
            if (y + dy < ballRadius) {
                dy = -dy; // Reverse y-direction (top wall)
            } else if (y + dy > canvas.height - ballRadius) {
                // Ball hits bottom edge
                if (x > paddleX && x < paddleX + paddleWidth) {
                    // Ball hits paddle
                    dy = -dy; // Reverse y-direction
                    // Add slight angle variation based on where it hits the paddle
                    const hitPoint = x - (paddleX + paddleWidth / 2);
                    dx = hitPoint * 0.1; // Adjust this factor for more/less spin
                } else {
                    // Ball missed paddle, lose a life
                    lives--;
                    if (lives <= 0) {
                        gameOver = true;
                        showMessageBox('GAME OVER', 'You ran out of lives. Try again!', () => {
                            restartButton.style.display = 'block';
                            startButton.style.display = 'none';
                        });
                    } else {
                        // Reset ball and paddle for next life
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 2; // Reset initial direction
                        dy = -2;
                        paddleX = (canvas.width - paddleWidth) / 2;
                        draw(); // Redraw immediately after reset
                    }
                }
            }

            // Move paddle based on key presses
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            collisionDetection(); // Check for brick collisions
            draw(); // Redraw all elements

            // Request next animation frame
            animationFrameId = requestAnimationFrame(update);
        }

        // --- Input Handlers ---

        /**
         * Handles key down events for paddle movement.
         * @param {KeyboardEvent} e - The keyboard event.
         */
        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        }

        /**
         * Handles key up events for paddle movement.
         * @param {KeyboardEvent} e - The keyboard event.
         */
        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        }

        /**
         * Handles mouse move events for paddle movement.
         * @param {MouseEvent} e - The mouse event.
         */
        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
                // Keep paddle within canvas boundaries
                if (paddleX < 0) paddleX = 0;
                if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
            }
        }

        let initialTouchX = 0; // To track initial touch position for movement

        /**
         * Handles touch start events.
         * @param {TouchEvent} e - The touch event.
         */
        function touchStartHandler(e) {
            e.preventDefault(); // Prevent scrolling
            if (e.touches.length === 1) {
                initialTouchX = e.touches[0].clientX;
            }
        }

        /**
         * Handles touch move events for paddle movement.
         * @param {TouchEvent} e - The touch event.
         */
        function touchMoveHandler(e) {
            e.preventDefault(); // Prevent scrolling
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const relativeX = touch.clientX - canvas.getBoundingClientRect().left;
                if (relativeX > 0 && relativeX < canvas.width) {
                    paddleX = relativeX - paddleWidth / 2;
                    // Keep paddle within canvas boundaries
                    if (paddleX < 0) paddleX = 0;
                    if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
                }
            }
        }

        /**
         * Handles touch end events.
         * @param {TouchEvent} e - The touch event.
         */
        function touchEndHandler(e) {
            e.preventDefault(); // Prevent scrolling
        }

        // --- Game Control Functions ---

        /**
         * Starts the game. Hides start button and begins the update loop.
         */
        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                startButton.style.display = 'none';
                restartButton.style.display = 'none'; // Ensure restart is hidden at start
                update(); // Start the game loop
            }
        }

        /**
         * Restarts the game. Resets all game variables and starts a new game.
         */
        function restartGame() {
            resetGame();
            gameStarted = true;
            restartButton.style.display = 'none';
            startButton.style.display = 'none';
            update(); // Start the new game loop
        }

    </script>
</body>
</html>
